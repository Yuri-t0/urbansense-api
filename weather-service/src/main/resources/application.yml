server:
  port: 8080

spring:
  application:
    name: weather-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/urbanintel_weather}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=600s

weather:
  api:
    base-url: https://api.openweathermap.org
    key: ${OPENWEATHER_API_KEY:demo}

monitored-cities:
  - name: Sao Paulo
    lat: -23.5505
    lon: -46.6333
  - name: Osasco
    lat: -23.5329
    lon: -46.7919
  - name: Guarulhos
    lat: -23.4543
    lon: -46.5333

weather:
  update:
    interval: 900000

jwt:
  secret: ${JWT_SECRET:urban-intel-super-secret-key-2024-must-be-long-enough}
  expiration: 86400000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
