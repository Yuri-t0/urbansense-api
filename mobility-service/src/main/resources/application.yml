server:
  port: 8082

spring:
  application:
    name: mobility-service

  datasource:
    url: jdbc:postgresql://localhost:5435/urbanintel_mobility
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=300s

  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: 5672
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}

services:
  weather:
    url: ${WEATHER_SERVICE_URL:http://localhost:8080}

jwt:
  secret: ${JWT_SECRET:urban-intel-super-secret-key-2024-must-be-long-enough}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
